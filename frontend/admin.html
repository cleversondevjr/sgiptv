<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - SG IPTV</title>

  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="cliente.css">
</head>
<body>

<div class="container admin-container">
  <div class="card painel-card admin-card">

    <div class="topo">
      <img src="assets/logo.png" alt="SG IPTV" class="logo-small">
      <button class="sair" onclick="sairAdmin()">Sair</button>
    </div>

    <h1>Painel Admin</h1>
    <p>Gerencie pagamentos, clientes e renovações.</p>

    <div class="admin-nav">
      <button id="btnPagamentos" class="nav-active" onclick="mostrarSecaoAdmin('pagamentos')">Pagamentos</button>
      <button id="btnTestes" onclick="mostrarSecaoAdmin('testes')">Testes IPTV</button>
      <button id="btnClientes" onclick="mostrarSecaoAdmin('clientes')">Clientes</button>
      <button onclick="carregarPagamentos(); carregarTestes();">Atualizar Dados</button>
    </div>

    <div id="adminMensagem"></div>

    <section id="pagamentos" class="renovar-box admin-section">
      <h2>Pagamentos</h2>

      <div class="admin-report">
        <h3>Relatorio mensal</h3>
        <div class="month-tabs" id="monthTabs"></div>
        <div class="month-summary" id="monthSummary"></div>

        <div class="tabela-area admin-hidden" id="monthTableBox">
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Email</th>
                <th>WhatsApp</th>
                <th>Plano</th>
                <th>Valor</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="listaPagamentosMes"></tbody>
          </table>
        </div>
      </div>

      <div class="tabela-area">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>WhatsApp</th>
              <th>Login</th>
              <th>Senha</th>
              <th>Detalhes</th>
            </tr>
          </thead>
          <tbody id="listaPagamentos"></tbody>
        </table>
      </div>
    </section>

    <section id="testes" class="renovar-box admin-section admin-hidden">
      <h2>Testes IPTV</h2>

      <div class="tabela-area">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Email</th>
              <th>WhatsApp</th>
              <th>Login</th>
              <th>Senha</th>
              <th>Criado em</th>
              <th>Expira em</th>
            </tr>
          </thead>
          <tbody id="listaTestes"></tbody>
        </table>
      </div>
    </section>

    <section id="clientes" class="renovar-box admin-section admin-hidden">
      <h2>Clientes</h2>

      <div class="tabela-area">
        <table>
          <thead>
            <tr>
              <th>Usuario</th>
              <th>Senha</th>
              <th>Plano</th>
              <th>Conexoes</th>
              <th>Vencimento</th>
              <th>Contato</th>
            </tr>
          </thead>
          <tbody id="listaClientes"></tbody>
        </table>
      </div>
    </section>

  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
