<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SG IPTV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<header>
  <h1>SG IPTV</h1>
  <a href="#checkout">Assinar</a>
</header>

<section class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h2>ASSISTA TUDO <br><span>QUE VOCÊ AMA</span></h2>
    <p>Canais, filmes e séries sem travamento</p>
    <button onclick="scrollCheckout()">ASSINAR AGORA</button>
  </div>
</section>

<section class="planos">
  <h2>ESCOLHA SEU PLANO</h2>

  <div class="plans">
    <div class="plan">
      <h3>Mensal 1 Tela</h3>
      <p class="price">R$30</p>
      <button onclick="selecionarPlano('30')">Escolher</button>
    </div>

    <div class="plan destaque">
      <h3>Mensal 2 Telas</h3>
      <p class="price">R$50</p>
      <button onclick="selecionarPlano('50')">Escolher</button>
    </div>

    <div class="plan">
      <h3>Trimestral 1 Tela</h3>
      <p class="price">R$80</p>
      <button onclick="selecionarPlano('80')">Escolher</button>
    </div>

    <div class="plan">
      <h3>Trimestral 2 Telas</h3>
      <p class="price">R$130</p>
      <button onclick="selecionarPlano('130')">Escolher</button>
    </div>
  </div>
</section>

<section id="checkout" class="checkout">
  <h2>Pagamento via Pix</h2>

  <select id="plano">
    <option value="30">Mensal 1 Tela - R$30</option>
    <option value="50">Mensal 2 Telas - R$50</option>
    <option value="80">Trimestral 1 Tela - R$80</option>
    <option value="130">Trimestral 2 Telas - R$130</option>
  </select>

  <input type="email" id="email" placeholder="Seu email">

  <button onclick="gerarPix()">GERAR PIX</button>

  <div id="pix"></div>
</section>

<script src="script.js"></script>
</body>
</html>
