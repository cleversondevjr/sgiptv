<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - SG IPTV</title>

  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="cliente.css">
</head>
<body>

<div class="container">
  <div class="card login-card">

    <img src="assets/logo.png" alt="SG IPTV" class="logo">

    <h1>Painel Admin</h1>
    <p>Faça login para gerenciar pagamentos e clientes.</p>

    <form id="adminLoginForm" autocomplete="on">
      <label>Usuário</label>
      <input type="text" id="adminUser" placeholder="Digite o usuário" autocomplete="username">

      <label>Senha</label>
      <input type="password" id="adminPass" placeholder="Digite a senha" autocomplete="current-password">

      <button type="submit">Entrar</button>
    </form>

    <div id="loginMsg"></div>

  </div>
</div>

<script src="admin.js"></script>

</body>
</html>
